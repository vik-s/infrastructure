---

- name: Install curl
  apt:
    name: curl
    state: present
    update_cache: yes

- name: Install OpenClaw
  shell: curl -fsSL https://openclaw.ai/install.sh | bash -s -- --beta
  args:
    creates: /usr/bin/openclaw

- name: Symlink openclaw as claude for CLI compatibility
  file:
    src: /usr/bin/openclaw
    dest: /usr/bin/claude
    state: link

- name: Set OPENCLAW_HOME to persistent storage
  lineinfile:
    path: /etc/environment
    line: OPENCLAW_HOME=/mnt/tank/openclaw
    regexp: ^OPENCLAW_HOME=
    state: present

- name: Symlink .openclaw config to persistent storage
  file:
    src: /mnt/tank/openclaw/.openclaw
    dest: /home/vik/.openclaw
    state: link
    owner: vik
    group: vik
    force: yes

- name: Ensure workspace directory exists
  file:
    path: /mnt/tank/openclaw/.openclaw/workspace
    state: directory
    owner: vik
    group: vik
    mode: "0755"

- name: Write claude-max-api-proxy .env file
  copy:
    content: "CLAUDE_CODE_OAUTH_TOKEN={{ secret_claude_code_oauth_token }}\n"
    dest: /mnt/tank/openclaw/.openclaw/workspace/.env
    owner: vik
    group: vik
    mode: "0600"
  notify: restart claude-max-api-proxy

- name: Install Node.js 20 repo
  shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Install claude-max-api-proxy
  npm:
    name: claude-max-api-proxy
    global: yes
    state: present

- name: Install claude-max-api-proxy systemd service
  copy:
    src: claude-max-api-proxy.service
    dest: /etc/systemd/system/claude-max-api-proxy.service
    owner: root
    group: root
    mode: "0644"
  notify: restart claude-max-api-proxy

- name: Enable and start claude-max-api-proxy
  systemd:
    name: claude-max-api-proxy
    enabled: yes
    state: started
    daemon_reload: yes

- name: Configure openclaw to use claude-max-api-proxy
  copy:
    content: |
      {
        "env": {
          "OPENAI_API_KEY": "not-needed",
          "OPENAI_BASE_URL": "http://localhost:3456/v1"
        },
        "agents": {
          "defaults": {
            "model": {
              "primary": "openai/claude-sonnet-4"
            }
          }
        },
        "commands": {
          "native": "auto",
          "nativeSkills": "auto",
          "restart": true,
          "ownerDisplay": "raw"
        },
        "gateway": {
          "bind": "loopback",
          "auth": {
            "mode": "none"
          }
        }
      }
    dest: /mnt/tank/openclaw/.openclaw/openclaw.json
    owner: vik
    group: vik
    mode: "0644"
  notify: restart openclaw gateway

- name: Remove old cron-based gateway startup
  cron:
    name: openclaw-gateway
    user: vik
    state: absent

- name: Install openclaw gateway systemd service
  copy:
    src: openclaw-gateway.service
    dest: /etc/systemd/system/openclaw-gateway.service
    owner: root
    group: root
    mode: "0644"
  notify: restart openclaw gateway

- name: Enable and start openclaw gateway
  systemd:
    name: openclaw-gateway
    enabled: yes
    state: started
    daemon_reload: yes
